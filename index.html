<!DOCTYPE html>
<html lang="zh-TW" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PE Project Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#151F32',
                900: '#0f172a',
                950: '#020617'
              },
              primary: {
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7'
              }
            }
          }
        }
      };
    </script>
    <style>
      .rich-editor { padding: 0.75rem 1rem; font-size: 0.875rem; color: #cbd5e1; line-height: 1.7; white-space: pre-wrap; }
      .rich-editor:empty:before { content: attr(data-placeholder); color: #475569; }
      .rich-editor td, .rich-editor th { color: #cbd5e1; }
      .rich-editor th { background: rgba(148, 163, 184, 0.08); font-weight: 600; }
      .rich-editor table { white-space: normal; }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
